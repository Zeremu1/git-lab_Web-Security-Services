name: Automation Workflow
on:
  issues:
    types: [closed]
  pull_request:
    types: [opened]

jobs:
  automate-github:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      # Task 1: Automate Issue Handling (When closed)
      - name: Comment on resolved issue
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'The issue is now resolved.'
            })

      # Task 2: Automate Pull Request Interaction (First-time PR)
      - name: Congratulate first PR
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            const { owner, repo } = context.repo;
            
            // Search for previous PRs by this user in this repo
            const res = await github.rest.search.issuesAndPullRequests({
              q: `is:pr author:${creator} repo:${owner}/${repo}`
            });

            // If this is their only PR, it's their first!
            if (res.data.total_count >= 1) {
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: owner,
                repo: repo,
                body: `Congratulations @${creator} on your first pull request!`
              })
            }
